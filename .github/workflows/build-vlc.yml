# VLC Android 云端构建 — 带 CJK 中文字体修正
# 使用方法：
#   1. 将本文件放入 vlc-android 仓库的 .github/workflows/ 目录
#   2. 在 GitHub 仓库页面点 Actions → Build VLC Android → Run workflow
#   3. 等待约 30-60 分钟后从 Artifacts 下载 APK

name: Build VLC Android (CJK Font Fix)

on:
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build in VLC Docker container
        run: |
          docker run --rm \
            --user root \
            -e GIT_CONFIG_COUNT=2 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0='*' \
            -e GIT_CONFIG_KEY_1="user.email" \
            -e GIT_CONFIG_VALUE_1="ci@vlc-android.local" \
            -v $GITHUB_WORKSPACE:/workspace \
            -w /workspace \
            registry.videolan.org/vlc-debian-android:20260610055743 \
            bash -c "
              set -e
              ./buildsystem/compile.sh --init -vlc4
              cd libvlcjni/vlc && patch -p1 < ../../CJK-font.patch && cd ../..
              echo 'CJK font patch applied successfully'
              ./gradlew assembleDebug -PforceVlc4=true
            "

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VLC-Android-Debug-APK
          path: application/app/build/outputs/apk/debug/VLC-Android-*.apk
