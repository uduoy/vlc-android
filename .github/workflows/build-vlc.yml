name: Build VLC Android (CJK Font Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMG: registry.videolan.org/vlc-debian-android:20260610055743
    steps:
      - uses: actions/checkout@v4

      - name: Init VLC build environment
        run: |
          docker run --rm --user root \
            -e GIT_CONFIG_COUNT=3 \
            -e GIT_CONFIG_KEY_0=safe.directory -e GIT_CONFIG_VALUE_0='*' \
            -e GIT_CONFIG_KEY_1=user.email -e GIT_CONFIG_VALUE_1=ci@vlc.local \
            -e GIT_CONFIG_KEY_2=user.name -e GIT_CONFIG_VALUE_2='VLC CI' \
            -v $GITHUB_WORKSPACE:/ws -w /ws \
            $IMG bash -c 'set -e; ./buildsystem/compile.sh --init -vlc4'

      - name: Apply CJK font patches
        run: |
          docker run --rm --user root \
            -v $GITHUB_WORKSPACE:/ws -w /ws \
            $IMG python3 /ws/apply-cjk-patches.py

      - name: Build debug APK
        run: |
          docker run --rm --user root \
            -e GIT_CONFIG_COUNT=3 \
            -e GIT_CONFIG_KEY_0=safe.directory -e GIT_CONFIG_VALUE_0='*' \
            -e GIT_CONFIG_KEY_1=user.email -e GIT_CONFIG_VALUE_1=ci@vlc.local \
            -e GIT_CONFIG_KEY_2=user.name -e GIT_CONFIG_VALUE_2='VLC CI' \
            -v $GITHUB_WORKSPACE:/ws -w /ws \
            $IMG bash -c 'set -e; ./gradlew assembleDebug -PforceVlc4=true'

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VLC-Android-Debug-APK
          path: application/app/build/outputs/apk/debug/VLC-Android-*.apk
