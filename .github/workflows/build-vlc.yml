name: Build VLC Android (CJK Font Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKER_IMG: registry.videolan.org/vlc-debian-android:20260610055743
    steps:
      - uses: actions/checkout@v4

      - name: Init VLC build environment
        run: |
          docker run --rm --user root \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0='*' \
            -v $GITHUB_WORKSPACE:/workspace \
            -w /workspace \
            $DOCKER_IMG \
            bash -c "set -e; ./buildsystem/compile.sh --init -vlc4"

      - name: Apply CJK font patches
        run: |
          docker run --rm --user root \
            -v $GITHUB_WORKSPACE:/workspace \
            -w /workspace \
            $DOCKER_IMG \
            bash -c "
              set -e
              cd libvlcjni/vlc
              patch -p1 < /workspace/patch-001-platform-fonts.patch
              patch -p1 < /workspace/patch-002-android-cjk.patch
              echo 'CJK font patches applied successfully'
            "

      - name: Build debug APK
        run: |
          docker run --rm --user root \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0='*' \
            -v $GITHUB_WORKSPACE:/workspace \
            -w /workspace \
            $DOCKER_IMG \
            bash -c "set -e; ./gradlew assembleDebug -PforceVlc4=true"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VLC-Android-Debug-APK
          path: application/app/build/outputs/apk/debug/VLC-Android-*.apk
