# VLC Android 云端构建 — 带 CJK 中文字体修正
# 使用方法：
#   1. 将本文件放入 vlc-android 仓库的 .github/workflows/ 目录
#   2. 在 GitHub 仓库页面点 Actions → Build VLC Android → Run workflow
#   3. 等待约 30-60 分钟后从 Artifacts 下载 APK

name: Build VLC Android (CJK Font Fix)

on:
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: registry.videolan.org/vlc-debian-android:20260610055743

    steps:
      - uses: actions/checkout@v4

      - name: Fetch VLC source & dependencies
        run: ./buildsystem/compile.sh --init -vlc4

      - name: Apply CJK font patch
        run: |
          cd libvlcjni/vlc
          patch -p1 < ../../CJK-font.patch
          echo "CJK font patch applied successfully"

      - name: Build debug APK
        run: ./gradlew assembleDebug -PforceVlc4=true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VLC-Android-Debug-APK
          path: application/app/build/outputs/apk/debug/VLC-Android-*.apk
